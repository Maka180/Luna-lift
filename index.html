<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Lift | Welcome</title>
    <style>
        :root { --sage: #8A9A5B; --cream: #FAF9F6; --white: #ffffff; --glow-pink: #FFB6C1; }
        * { box-sizing: border-box; }
        body { background-color: var(--cream); margin: 0; font-family: 'Segoe UI', sans-serif; text-align: center; color: #4A4A4A; }

        .header-bar { display: flex; justify-content: flex-end; align-items: center; padding: 15px 20px; gap: 15px; }
        .profile-pic { width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--sage); object-fit: cover; background: #e0e0e0; cursor: pointer; flex-shrink: 0; }

        .hero-section { padding: 10px 20px; max-width: 600px; margin: 0 auto; }
        h1.logo { color: var(--sage); font-size: clamp(2.5rem, 10vw, 4.5rem); font-family: serif; letter-spacing: clamp(4px, 2vw, 8px); margin: 10px 0 20px; font-weight: bold; }

        .main-img-container {
            background: var(--white);
            padding: 12px;
            border-radius: 25px;
            box-shadow: 0 0 30px 15px rgba(255, 182, 193, 0.6);
            margin-bottom: 25px;
            border: 2px solid rgba(255, 182, 193, 0.3);
        }
        .main-img-container img { width: 100%; border-radius: 15px; display: block; }

        .hero-text h2 { font-size: clamp(0.9rem, 4vw, 1.3rem); margin: 0 0 20px; letter-spacing: 1px; }

        .btn-start { background-color: var(--sage); color: white; border: none; padding: 15px 40px; border-radius: 50px; font-size: clamp(1rem, 4vw, 1.2rem); font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; width: 100%; max-width: 280px; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-start:active { transform: scale(0.98); }

        .welcome-msg { color: var(--sage); font-weight: bold; font-size: clamp(0.9rem, 3.5vw, 1.1rem); margin-bottom: 10px; text-transform: uppercase; }

        @media (max-width: 480px) {
            .header-bar { padding: 12px 15px; }
            .hero-section { padding: 5px 15px; }
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <div onclick="document.getElementById('profile-upload').click()" style="cursor:pointer;">
            <img id="display-profile" class="profile-pic" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238A9A5B'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
            <input type="file" id="profile-upload" hidden accept="image/*">
        </div>
    </div>

    <div class="hero-section">
        <h1 class="logo">LUNA LIFT</h1>
        <div id="user-greeting" class="welcome-msg">WELCOME BACK!</div>
        <div class="main-img-container">
            <img src="https://images.unsplash.com/photo-1518611012118-696072aa579a?w=600" alt="Fitness Glow">
        </div>
        <div class="hero-text">
            <h2>SCULPT, STRENGTHEN, AND GLOW</h2>
            <button class="btn-start" onclick="window.location.href='workouts.html'">START WORKOUT</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const profileInput = document.getElementById('profile-upload');
            const profileImg = document.getElementById('display-profile');
            const userGreeting = document.getElementById('user-greeting');

            if (userGreeting) userGreeting.innerText = `WELCOME BACK!`;

            const savedPic = localStorage.getItem('lunaProfilePic');
            if (savedPic && profileImg) profileImg.src = savedPic;

            if (profileInput) {
                profileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            profileImg.src = event.target.result;
                            localStorage.setItem('lunaProfilePic', event.target.result);
                        };
                        reader.readAsDataURL(file);
                    }
                };
            }
        });
    </script>
</body>
</html>
