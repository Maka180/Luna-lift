
       <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Lift | Core & Abs</title>
    <style>
        :root { --sage: #8A9A5B; --blush: #FADADD; --cream: #FAF9F6; --white: #ffffff; --text: #4A4A4A; }
        * { box-sizing: border-box; }
        body { background-color: var(--cream); margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--text); overflow-x: hidden; }

        /* ── LAYOUT ── */
        .app-container { display: flex; min-height: 100vh; width: 100%; }
        .main-content { flex: 1; padding: clamp(15px, 4vw, 40px); min-width: 0; }

        .builder-sidebar {
            width: 320px; background: var(--white); border-left: 1px solid #eee;
            display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
        }

        /* ── HEADER ── */
        .page-header { margin-bottom: 15px; }
        .back-link { background: none; border: none; color: var(--sage); font-weight: bold; cursor: pointer; padding: 8px 0; display: flex; align-items: center; gap: 5px; font-size: 1rem; touch-action: manipulation; }
        .page-title { color: var(--sage); font-family: serif; font-size: clamp(1.8rem, 6vw, 2.5rem); margin: 5px 0; }

        /* ── TABS ── */
        .tab-bar { display: flex; gap: 8px; margin: 15px 0; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 10px 16px; border-radius: 20px; border: none; cursor: pointer; background: #eee; font-weight: bold; color: #666; white-space: nowrap; font-size: 0.85rem; flex-shrink: 0; touch-action: manipulation; }
        .tab-btn.active { background: var(--sage); color: white; }

        /* ── CARDS & GRID ── */
        .exercise-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr)); gap: 20px; margin-top: 20px; }
        .exercise-card { background: var(--white); border-radius: 20px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); text-align: center; border: 1px solid #f0f0f0; position: relative; }
        .exercise-card img { width: 100%; border-radius: 12px; margin-top: 10px; object-fit: cover; }

        /* ── BUTTONS ── */
        .btn-add { background: var(--blush); color: var(--sage); border: none; padding: 12px; border-radius: 25px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 12px; font-size: 0.95rem; touch-action: manipulation; }
        .btn-add:active { opacity: 0.8; }

        /* ── SEARCH ── */
        input[type="text"], input[type="month"], textarea {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border-radius: 10px; border: 1px solid #ddd; font-family: inherit;
            font-size: 16px; /* Prevents iOS zoom */
        }
        input[type="number"] { font-size: 16px; }

        /* ── SIDEBAR ── */
        .sidebar-header { background: var(--sage); color: white; padding: 18px; text-align: center; }
        .routine-items { flex: 1; padding: 15px; overflow-y: auto; list-style: none; margin: 0; -webkit-overflow-scrolling: touch; }
        .routine-items li { background: #f9f9f9; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; border: 1px solid #eee; }
        .sidebar-footer { padding: 10px; border-top: 1px solid #eee; }

        /* ── MOBILE SIDEBAR TOGGLE ── */
        .sidebar-toggle {
            display: none; position: fixed; bottom: 20px; right: 20px;
            background: var(--sage); color: white; border: none;
            width: 56px; height: 56px; border-radius: 50%;
            font-size: 1.4rem; cursor: pointer; z-index: 500;
            box-shadow: 0 4px 15px rgba(138,154,91,0.4);
            touch-action: manipulation;
        }
        .sidebar-badge { position: absolute; top: -4px; right: -4px; background: #ff6b6b; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* ── MODAL ── */
        #routine-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:3000; align-items:center; justify-content:center; backdrop-filter: blur(4px); padding: 20px; }
        .modal-content { background:white; padding:25px; border-radius:25px; width:100%; max-width:400px; text-align:center; }

        /* ── WORKOUT PLAYER ── */
        #workout-player { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .player-inner { max-width: 600px; margin: 0 auto; padding: clamp(20px, 5vw, 40px); }

        /* ── MOBILE OVERRIDES ── */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .builder-sidebar { display: none; width: 100%; height: auto; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 400; overflow-y: auto; }
            .builder-sidebar.open { display: flex; }
            .sidebar-toggle { display: flex; align-items: center; justify-content: center; }
            .exercise-grid { grid-template-columns: 1fr; }
            .tab-btn { font-size: 0.8rem; padding: 9px 14px; }
        }

        @media (min-width: 769px) {
            .builder-sidebar { display: flex !important; }
        }

        /* ── LOAD MORE ── */
        #load-more-container { text-align: center; margin: 30px 0; padding-bottom: 80px; }

        /* ── DIARY ── */
        .diary-form { max-width: 500px; margin: 0 auto 30px; }
    </style>
</head>
<body>

<div class="app-container">
    <main class="main-content">
        <header class="page-header">
            <button class="back-link" onclick="goBack()">← Back to Categories</button>
            <h1 class="page-title">Core & Abs 🔥</h1>
            <div class="tab-bar">
                <button id="tab-all" class="tab-btn active" onclick="toggleView('all')">All Exercises</button>
                <button id="tab-custom" class="tab-btn" onclick="toggleView('custom')">Create Move</button>
                <button id="tab-saved" class="tab-btn" onclick="toggleView('saved')">My Workouts</button>
                <button id="tab-diary" class="tab-btn" onclick="toggleView('diary')">Progress Diary</button>
            </div>
        </header>

        <div id="view-all">
            <input type="text" id="exercise-search" placeholder="🔍 Search exercises...">
            <div id="exercise-container" class="exercise-grid"></div>
            <div id="load-more-container">
                <p id="exercise-counter" style="color: var(--sage); font-weight: bold; margin-bottom: 15px; font-size: 0.9rem;"></p>
                <div style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
                    <button id="load-less-btn" class="btn-add" style="display:none; width:140px; background:#ccc; color:white; margin:0;">Load Less −</button>
                    <button id="load-more-btn" class="btn-add" style="display:none; width:140px; background:var(--sage); color:white; margin:0;">Load More +</button>
                </div>
            </div>
        </div>

        <div id="view-custom" style="display:none; max-width:500px; margin:0 auto;">
            <div class="exercise-card">
                <h3 style="color:var(--sage);">Add New Move</h3>
                <input type="text" id="custom-name" placeholder="Exercise Name">
                <input type="text" id="custom-equipment" placeholder="Equipment">
                <input type="text" id="custom-gif" placeholder="Image URL">
                <button id="add-custom-btn" class="btn-add" style="background:var(--sage); color:white;">Save to Library</button>
            </div>
        </div>

        <div id="view-saved" style="display:none;">
            <div id="routines-gallery" class="exercise-grid"></div>
        </div>

        <div id="view-diary" style="display:none;">
            <div class="exercise-card diary-form">
                <h3 style="color:var(--sage);">Monthly Progress Log</h3>
                <input type="month" id="diary-month">
                <input type="text" id="diary-weight" placeholder="Weight (e.g. 65kg)">
                <textarea id="diary-notes" placeholder="Notes on progress, energy, or goals..." rows="3"></textarea>
                <label style="display:block; text-align:left; font-size:0.8rem; margin-bottom:5px; color:#666;">Progress Photo:</label>
                <input type="file" id="diary-photo" accept="image/*" style="font-size:14px;">
                <button id="save-diary-btn" class="btn-add" style="background:var(--sage); color:white;">Save Monthly Entry</button>
            </div>
            <div id="diary-gallery" class="exercise-grid"></div>
        </div>
    </main>

    <aside class="builder-sidebar" id="main-sidebar">
        <div class="sidebar-header">
            <h3 style="margin:0;">Routine Builder</h3>
            <small id="item-count">0 added</small>
        </div>
        <ul id="routine-list" class="routine-items">
            <p style="text-align:center; color:#ccc; margin-top:50px;">Add moves to build a routine.</p>
        </ul>
        <div class="sidebar-footer">
            <p style="font-size:0.75rem; color:var(--sage); font-weight:bold; margin-bottom:5px;">ADD PLAYLIST LINK</p>
            <input type="text" id="playlist-link" placeholder="Paste Spotify or YouTube link...">
            <input type="text" id="routine-name" placeholder="Routine Name">
            <button onclick="saveRoutineWithMusic()" style="width:100%; padding:14px; background:var(--sage); color:white; border:none; border-radius:10px; margin-top:8px; cursor:pointer; font-weight:bold; font-size:0.95rem;">SAVE ROUTINE</button>
            <button id="clear-builder-btn" style="width:100%; border:none; background:none; color:#ff6b6b; cursor:pointer; margin-top:10px; font-weight:bold; padding:8px;">Clear Builder</button>
            <!-- Close sidebar on mobile -->
            <button onclick="closeSidebar()" style="width:100%; border:none; background:#f5f5f5; color:#666; cursor:pointer; margin-top:8px; padding:10px; border-radius:10px; display:none;" id="close-sidebar-btn">✕ Close</button>
        </div>
    </aside>
</div>

<!-- Floating button to open sidebar on mobile -->
<button class="sidebar-toggle" id="sidebar-toggle-btn" onclick="openSidebar()">
    🏋️
    <span class="sidebar-badge" id="sidebar-badge" style="display:none;">0</span>
</button>

<!-- Modal -->
<div id="routine-modal">
    <div class="modal-content">
        <h3 style="color:var(--sage);">Add To...</h3>
        <div id="modal-choices" style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px; max-height:50vh; overflow-y:auto;"></div>
        <button onclick="closeRoutineModal()" style="background:#eee; border:none; padding:12px; border-radius:25px; cursor:pointer; width:100%; font-size:1rem;">Cancel</button>
    </div>
</div>

<!-- Workout Player -->
<div id="workout-player">
    <div class="player-inner">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <button onclick="closeWorkout()" style="background:#eee; border:none; padding:10px 18px; border-radius:15px; cursor:pointer; font-size:0.95rem;">✕ End</button>
            <div id="player-timer" style="font-family:monospace; font-size:1.5rem; color:var(--sage); font-weight:bold;">00:00</div>
        </div>
        <div id="ready-screen" style="text-align:center;">
            <h1 id="ready-name" style="color:var(--sage); font-family:serif; font-size:clamp(1.5rem,6vw,2.5rem);"></h1>
            <p id="ready-info" style="margin-bottom:30px;"></p>
            <button onclick="beginTracking()" class="btn-add" style="font-size:1.2rem; background:var(--sage); color:white; padding:18px; max-width:280px;">START 💪</button>
        </div>
        <div id="active-tracker" style="display:none; text-align:center;">
            <p id="player-progress" style="color:#999; font-weight:bold;"></p>
            <div class="exercise-card">
                <h2 id="player-ex-name" style="color:var(--sage); font-size:clamp(1.1rem,5vw,1.5rem);"></h2>
                <img id="player-gif" src="" style="max-height:180px; object-fit:contain; width:100%;">
                <div style="margin-top:15px; background:#f9f9f9; border-radius:15px; padding:15px;">
                    <div style="display:flex; justify-content:center; gap:20px; margin-bottom:12px;">
                        <div>
                            <label style="font-size:0.75rem; color:var(--sage); font-weight:bold; display:block; margin-bottom:4px;">REPS</label>
                            <input type="number" id="input-reps" min="0" value="10" style="width:75px; padding:10px; border-radius:10px; border:1px solid #ddd; text-align:center; font-size:1.1rem; font-weight:bold;">
                        </div>
                        <div>
                            <label style="font-size:0.75rem; color:var(--sage); font-weight:bold; display:block; margin-bottom:4px;">WEIGHT (kg)</label>
                            <input type="number" id="input-weight" min="0" value="0" style="width:75px; padding:10px; border-radius:10px; border:1px solid #ddd; text-align:center; font-size:1.1rem; font-weight:bold;">
                        </div>
                    </div>
                    <button onclick="logSet()" style="background:var(--sage); color:white; border:none; padding:12px 25px; border-radius:20px; font-weight:bold; cursor:pointer; width:100%; font-size:1rem;">✅ Log Set</button>
                    <div id="sets-log" style="margin-top:10px; max-height:150px; overflow-y:auto;"></div>
                </div>
            </div>
            <div style="display:flex; justify-content:center; gap:15px; margin-top:20px;">
                <button onclick="prevStep()" class="tab-btn" style="padding:12px 20px; font-size:1rem;">←</button>
                <button onclick="nextStep()" class="tab-btn" style="background:var(--sage); color:white; padding:12px 20px; font-size:1rem;">Next / Finish</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ── CONFIG ──
    const PAGE_MUSCLES = ['abdominals', 'abductors', 'adductors', 'lower_back'];
    const PAGE_EMOJI = '🔥';
    const API_NINJAS_KEY = '5OSwks4t27SenbpSZvVKMFfOK92om3GXbDFoKRlK';
    const PAGE_KEY = 'core';

    // ── STATE ──
    const currentUser = localStorage.getItem('lunaUser') || 'guest';
    const KEY_ROUTINES = `lunaSavedRoutines_${PAGE_KEY}_${currentUser}`;
    const KEY_DIARY = `lunaDiary_${PAGE_KEY}_${currentUser}`;
    const KEY_CUSTOM = `lunaCustomExercises_${PAGE_KEY}_${currentUser}`;

    let allExercises = [], filteredExercises = [], activeRoutine = [];
    let currentIndex = 10;
    const step = 10;
    let currentWorkout = null, currentStep = 0, sessionSeconds = 0, sessionInterval = null;
    let pendingExercise = null, sessionSets = {};

    function goBack() { window.location.href = 'workouts.html'; }

    // ── SIDEBAR MOBILE ──
    function openSidebar() {
        document.getElementById('main-sidebar').classList.add('open');
        document.getElementById('close-sidebar-btn').style.display = 'block';
    }
    function closeSidebar() {
        document.getElementById('main-sidebar').classList.remove('open');
    }

    // ── TAB TOGGLE ──
    function toggleView(view) {
        ['view-all','view-custom','view-saved','view-diary'].forEach(v => {
            document.getElementById(v).style.display = (v === `view-${view}`) ? 'block' : 'none';
        });
        const sidebar = document.getElementById('main-sidebar');
        if (window.innerWidth >= 769) {
            sidebar.style.display = (view === 'all') ? 'flex' : 'none';
        }
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${view}`)?.classList.add('active');
        if (view === 'saved') displaySavedRoutines();
        if (view === 'diary') displayDiary();
    }

    // ── API & RENDER ──
    async function getExercises() {
        try {
            const custom = JSON.parse(localStorage.getItem(KEY_CUSTOM)) || [];
            let results = [];
            for (const muscle of PAGE_MUSCLES) {
                const res = await fetch(`https://api.api-ninjas.com/v1/exercises?muscle=${muscle}&limit=20`, {
                    headers: { 'X-Api-Key': API_NINJAS_KEY }
                });
                results = [...results, ...await res.json()];
            }
            const seen = new Set();
            results = results.filter(ex => { if(seen.has(ex.name)) return false; seen.add(ex.name); return true; });
            allExercises = [...custom, ...results.map((ex, i) => ({
                id: 'api-' + i, name: ex.name, equipment: ex.type,
                difficulty: ex.difficulty, instructions: ex.instructions, gifUrl: null
            }))];
            filteredExercises = [...allExercises];
            renderBatch(true);
        } catch(e) { console.error("API Error:", e); }
    }

    function renderBatch(isNewSearch = false) {
        const container = document.getElementById('exercise-container');
        if (!container) return;
        if (isNewSearch) currentIndex = 10;
        container.innerHTML = '';
        const currentView = filteredExercises.slice(0, currentIndex);
        currentView.forEach(ex => {
            const div = document.createElement('div');
            div.className = 'exercise-card';
            div.innerHTML = `
                <h4 style="margin:0 0 5px; font-size:0.95rem;">${ex.name.toUpperCase()}</h4>
                <div style="min-height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg,#f8f4f0,#fce4ec); border-radius:12px; margin:10px 0; padding:12px;">
                    <div style="font-size:2rem; margin-bottom:6px;">${PAGE_EMOJI}</div>
                    <div style="font-size:0.75rem; color:var(--sage); font-weight:bold; text-transform:uppercase; letter-spacing:1px;">${ex.equipment || 'Bodyweight'}</div>
                    <div style="font-size:0.7rem; color:#bbb; margin-top:4px; text-transform:capitalize;">${ex.difficulty || ''}</div>
                </div>
                ${ex.instructions ? `<details style="margin:8px 0; font-size:0.78rem; color:#666;">
                    <summary style="color:var(--sage); font-weight:bold; cursor:pointer; list-style:none; text-align:center;">📋 How to do it</summary>
                    <p style="margin-top:8px; line-height:1.5; padding:0 5px; text-align:left;">${ex.instructions}</p>
                </details>` : ''}
                <button class="btn-add" onclick="openRoutineModal('${ex.id}','${ex.name.replace(/'/g,"\\'")}')">+ Add to Routine</button>`;
            container.appendChild(div);
        });
        const counterLabel = document.getElementById('exercise-counter');
        if (counterLabel) counterLabel.innerText = filteredExercises.length > 0
            ? `Showing ${currentView.length} of ${filteredExercises.length} exercises` : "No exercises found.";
        const loadMoreBtn = document.getElementById('load-more-btn');
        const loadLessBtn = document.getElementById('load-less-btn');
        if (loadMoreBtn) { loadMoreBtn.style.display = currentIndex < filteredExercises.length ? 'inline-block' : 'none'; loadMoreBtn.onclick = () => { currentIndex += step; renderBatch(false); }; }
        if (loadLessBtn) { loadLessBtn.style.display = currentIndex > 10 ? 'inline-block' : 'none'; loadLessBtn.onclick = () => { currentIndex = Math.max(10, currentIndex - step); renderBatch(false); window.scrollTo({top:0,behavior:'smooth'}); }; }
    }

    // ── MODAL ──
    function openRoutineModal(id, name) {
        pendingExercise = { id, name };
        const saved = JSON.parse(localStorage.getItem(KEY_ROUTINES)) || [];
        const choices = document.getElementById('modal-choices');
        choices.innerHTML = `<button class="btn-add" style="margin:0;" onclick="confirmAddToActive()">+ Current Builder</button>`;
        saved.forEach(r => {
            const btn = document.createElement('button');
            btn.className = 'btn-add'; btn.style.cssText = "margin:0; background:var(--sage); color:white;";
            btn.innerText = `Add to: ${r.name}`; btn.onclick = () => injectIntoExisting(r.id);
            choices.appendChild(btn);
        });
        document.getElementById('routine-modal').style.display = 'flex';
    }
    function closeRoutineModal() { document.getElementById('routine-modal').style.display = 'none'; pendingExercise = null; }
    function confirmAddToActive() { if (!activeRoutine.find(i => i.id === pendingExercise.id)) { activeRoutine.push(pendingExercise); updateRoutineUI(); } closeRoutineModal(); }
    function injectIntoExisting(routineId) {
        let saved = JSON.parse(localStorage.getItem(KEY_ROUTINES)) || [];
        let rIdx = saved.findIndex(r => r.id === routineId);
        if (rIdx !== -1 && !saved[rIdx].exercises.find(ex => ex.id === pendingExercise.id)) {
            saved[rIdx].exercises.push(pendingExercise);
            localStorage.setItem(KEY_ROUTINES, JSON.stringify(saved));
        }
        closeRoutineModal();
    }

    // ── BUILDER ──
    function updateRoutineUI() {
        const list = document.getElementById('routine-list');
        const countLabel = document.getElementById('item-count');
        const badge = document.getElementById('sidebar-badge');
        if (countLabel) countLabel.innerText = `${activeRoutine.length} added`;
        if (badge) { badge.innerText = activeRoutine.length; badge.style.display = activeRoutine.length > 0 ? 'flex' : 'none'; }
        list.innerHTML = activeRoutine.length === 0
            ? `<p style="text-align:center; color:#ccc; margin-top:50px;">Add moves to build a routine.</p>`
            : activeRoutine.map((item, i) => `<li>${item.name.toUpperCase()} <button onclick="removeFromRoutine(${i})" style="color:red; border:none; background:none; cursor:pointer; font-size:1rem;">✕</button></li>`).join('');
    }
    function removeFromRoutine(i) { activeRoutine.splice(i, 1); updateRoutineUI(); }

    function saveRoutineWithMusic() {
        const name = document.getElementById('routine-name').value;
        const link = document.getElementById('playlist-link').value;
        if (!name || activeRoutine.length === 0) { alert("Please add moves and a routine name! ✨"); return; }
        const saved = JSON.parse(localStorage.getItem(KEY_ROUTINES)) || [];
        saved.push({ id: Date.now(), name, music: link, exercises: [...activeRoutine], lastStats: null });
        localStorage.setItem(KEY_ROUTINES, JSON.stringify(saved));
        alert("Routine Saved! 💪");
        activeRoutine = []; document.getElementById('routine-name').value = ''; document.getElementById('playlist-link').value = '';
        updateRoutineUI(); displaySavedRoutines(); toggleView('saved'); closeSidebar();
    }

    function displaySavedRoutines() {
        const gallery = document.getElementById('routines-gallery');
        const saved = JSON.parse(localStorage.getItem(KEY_ROUTINES)) || [];
        if (saved.length === 0) { gallery.innerHTML = '<p style="text-align:center; color:#ccc; grid-column:1/-1;">No saved workouts yet.</p>'; return; }
        gallery.innerHTML = saved.map(r => {
            const stats = r.lastStats ? `<div style="font-size:0.7rem; color:#888; margin-top:10px; border-top:1px dashed #ddd; padding-top:5px;">📅 ${r.lastStats.date} | ⏱️ ${r.lastStats.time}</div>` : `<div style="font-size:0.7rem; color:#ccc; margin-top:10px;">No history yet</div>`;
            const musicBtn = r.music ? `<button onclick="event.stopPropagation(); window.open('${r.music}','_blank')" style="background:#FADADD; border:none; border-radius:10px; padding:6px 10px; font-size:0.7rem; cursor:pointer; margin-right:5px; color:var(--sage); font-weight:bold;">🎵 Music</button>` : '';
            return `<div class="exercise-card" onclick="startWorkout(${r.id})" style="cursor:pointer;">
                <h4 style="color:var(--sage); margin:0;">${r.name.toUpperCase()}</h4>
                <p style="margin:5px 0; font-size:0.85rem;">${r.exercises.length} Exercises</p>
                ${stats}
                <div style="margin-top:10px;">${musicBtn}<button onclick="event.stopPropagation(); deleteRoutine(${r.id})" style="color:#ff6b6b; border:none; background:none; font-size:0.75rem; cursor:pointer;">Delete</button></div>
            </div>`;
        }).join('');
    }

    function deleteRoutine(id) {
        if (confirm("Delete this routine?")) {
            let s = (JSON.parse(localStorage.getItem(KEY_ROUTINES)) || []).filter(r => r.id !== id);
            localStorage.setItem(KEY_ROUTINES, JSON.stringify(s)); displaySavedRoutines();
        }
    }

    // ── WORKOUT PLAYER ──
    function startWorkout(id) {
        const saved = JSON.parse(localStorage.getItem(KEY_ROUTINES));
        currentWorkout = saved.find(r => r.id === id);
        document.getElementById('workout-player').style.display = 'block';
        document.getElementById('ready-screen').style.display = 'block';
        document.getElementById('active-tracker').style.display = 'none';
        document.getElementById('ready-name').innerText = currentWorkout.name;
        document.getElementById('ready-info').innerText = `${currentWorkout.exercises.length} Exercises`;
    }

    function beginTracking() {
        document.getElementById('ready-screen').style.display = 'none';
        document.getElementById('active-tracker').style.display = 'block';
        currentStep = 0; sessionSeconds = 0; sessionSets = {};
        updatePlayerUI();
        sessionInterval = setInterval(() => {
            sessionSeconds++;
            const m = Math.floor(sessionSeconds/60).toString().padStart(2,'0');
            const s = (sessionSeconds%60).toString().padStart(2,'0');
            document.getElementById('player-timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function updatePlayerUI() {
        const ex = currentWorkout.exercises[currentStep];
        document.getElementById('player-ex-name').innerText = ex.name.toUpperCase();
        const exData = allExercises.find(i => i.id === ex.id) || {};
        document.getElementById('player-gif').src = exData.gifUrl || '';
        document.getElementById('player-progress').innerText = `${currentStep + 1} / ${currentWorkout.exercises.length}`;
        document.getElementById('input-reps').value = 10;
        document.getElementById('input-weight').value = 0;
        if (!sessionSets[ex.id]) sessionSets[ex.id] = { name: ex.name, sets: [] };
        renderSetsLog(ex.id);
    }

    function logSet() {
        const ex = currentWorkout.exercises[currentStep];
        const reps = parseInt(document.getElementById('input-reps').value) || 0;
        const weight = parseFloat(document.getElementById('input-weight').value) || 0;
        if (reps === 0) return alert("Please enter at least 1 rep!");
        if (!sessionSets[ex.id]) sessionSets[ex.id] = { name: ex.name, sets: [] };
        sessionSets[ex.id].sets.push({ reps, weight });
        renderSetsLog(ex.id);
    }

    function renderSetsLog(exId) {
        const log = document.getElementById('sets-log');
        const data = sessionSets[exId];
        if (!data || data.sets.length === 0) { log.innerHTML = ''; return; }
        let exTotal = 0;
        data.sets.forEach(s => exTotal += s.reps * s.weight);
        log.innerHTML = data.sets.map((s, i) => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 10px; background:white; border-radius:8px; margin-top:5px; font-size:0.8rem; border:1px solid #eee;">
                <span style="color:var(--sage); font-weight:bold;">Set ${i+1}</span>
                <span>${s.reps} reps</span>
                <span>${s.weight > 0 ? s.weight + ' kg' : 'BW'}</span>
                <button onclick="deleteSet('${exId}',${i})" style="color:#ff6b6b; border:none; background:none; cursor:pointer;">✕</button>
            </div>`).join('') + `<div style="text-align:right; font-size:0.75rem; color:var(--sage); font-weight:bold; margin-top:6px;">Vol: ${exTotal > 0 ? exTotal + ' kg' : 'Bodyweight'}</div>`;
    }

    function deleteSet(exId, index) { if (sessionSets[exId]) { sessionSets[exId].sets.splice(index, 1); renderSetsLog(exId); } }

    function nextStep() {
        if (currentStep < currentWorkout.exercises.length - 1) { currentStep++; updatePlayerUI(); }
        else { logFinalStats(); alert("Workout Complete! 💪"); closeWorkout(true); }
    }

    function logFinalStats() {
        let saved = JSON.parse(localStorage.getItem(KEY_ROUTINES)) || [];
        let idx = saved.findIndex(r => r.id === currentWorkout.id);
        if (idx !== -1) {
            let totalVolume = 0, totalReps = 0;
            const exerciseBreakdown = Object.values(sessionSets).map(ex => {
                let exVolume = 0, exReps = 0;
                ex.sets.forEach(s => { exReps += s.reps; exVolume += s.reps * s.weight; });
                totalReps += exReps; totalVolume += exVolume;
                return { name: ex.name, sets: ex.sets, totalReps: exReps, totalVolume: exVolume };
            });
            saved[idx].lastStats = { date: new Date().toLocaleDateString(), time: document.getElementById('player-timer').innerText, totalReps, totalVolume: totalVolume.toFixed(1), exerciseBreakdown };
            localStorage.setItem(KEY_ROUTINES, JSON.stringify(saved));
        }
    }

    function closeWorkout(skip = false) {
        if (skip || confirm("End Session?")) { document.getElementById('workout-player').style.display = 'none'; clearInterval(sessionInterval); document.getElementById('player-timer').innerText = "00:00"; }
    }

    function prevStep() { if (currentStep > 0) { currentStep--; updatePlayerUI(); } }

    // ── DIARY ──
    async function saveDiaryEntry() {
        const month = document.getElementById('diary-month').value;
        if (!month) return alert("Select a month!");
        const photoFile = document.getElementById('diary-photo').files[0];
        let imageData = "";
        if (photoFile) imageData = await toBase64(photoFile);
        const entry = { id: Date.now(), month, weight: document.getElementById('diary-weight').value, notes: document.getElementById('diary-notes').value, image: imageData };
        const diary = JSON.parse(localStorage.getItem(KEY_DIARY)) || [];
        diary.push(entry);
        diary.sort((a,b) => new Date(b.month) - new Date(a.month));
        localStorage.setItem(KEY_DIARY, JSON.stringify(diary));
        document.getElementById('diary-weight').value = '';
        document.getElementById('diary-notes').value = '';
        document.getElementById('diary-photo').value = '';
        displayDiary();
    }

    function displayDiary() {
        const gallery = document.getElementById('diary-gallery');
        const diary = JSON.parse(localStorage.getItem(KEY_DIARY)) || [];
        gallery.innerHTML = diary.map(e => `
            <div class="exercise-card">
                <h4 style="color:var(--sage);">${new Date(e.month+"-02").toLocaleDateString(undefined,{month:'long',year:'numeric'})}</h4>
                ${e.image ? `<img src="${e.image}" style="width:100%; border-radius:10px; margin:10px 0;">` : '<div style="height:80px; background:#eee; margin:10px 0; border-radius:10px;"></div>'}
                <p><strong>${e.weight || '--'}</strong></p>
                <p style="font-size:0.8rem; color:#666;">${e.notes}</p>
                <button onclick="deleteDiaryEntry(${e.id})" style="color:red; border:none; background:none; font-size:0.75rem; cursor:pointer;">Delete</button>
            </div>`).join('');
    }

    function deleteDiaryEntry(id) {
        if (confirm("Delete entry?")) { let d = (JSON.parse(localStorage.getItem(KEY_DIARY))||[]).filter(e=>e.id!==id); localStorage.setItem(KEY_DIARY,JSON.stringify(d)); displayDiary(); }
    }

    const toBase64 = file => new Promise((res,rej) => { const r=new FileReader(); r.readAsDataURL(file); r.onload=()=>res(r.result); r.onerror=e=>rej(e); });

    // ── INIT ──
    window.onload = () => {
        getExercises();
        document.getElementById('exercise-search').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            filteredExercises = allExercises.filter(ex => ex.name.toLowerCase().includes(term));
            renderBatch(true);
        };
        document.getElementById('save-diary-btn').onclick = saveDiaryEntry;
        document.getElementById('add-custom-btn').onclick = () => {
            const n = document.getElementById('custom-name').value;
            if (!n) return alert("Enter a name!");
            const newEx = { id: 'custom-'+Date.now(), name: n, equipment: document.getElementById('custom-equipment').value, gifUrl: document.getElementById('custom-gif').value };
            const c = JSON.parse(localStorage.getItem(KEY_CUSTOM)) || [];
            c.push(newEx); localStorage.setItem(KEY_CUSTOM, JSON.stringify(c));
            allExercises.unshift(newEx); filteredExercises = [...allExercises]; renderBatch(true); toggleView('all');
        };
        document.getElementById('clear-builder-btn').onclick = () => { if (confirm("Clear current routine?")) { activeRoutine = []; updateRoutineUI(); } };
    };
</script>
</body>
</html>
