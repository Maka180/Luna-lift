<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Lift | Categories</title>
    <style>
        :root { --sage: #8A9A5B; --cream: #FAF9F6; --white: #ffffff; --blush: #FADADD; }
        * { box-sizing: border-box; }
        body { background-color: var(--cream); margin: 0; font-family: 'Segoe UI', sans-serif; text-align: center; }

        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .back-arrow { background: none; border: none; color: var(--sage); font-size: 1.8rem; cursor: pointer; font-weight: bold; padding: 5px; }
        .profile-pic { width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--sage); object-fit: cover; flex-shrink: 0; }

        .page-title { color: var(--sage); font-size: clamp(2rem, 8vw, 3rem); font-family: serif; margin: 10px 0 5px; }
        .subtitle { color: #888; font-size: clamp(0.8rem, 3vw, 1rem); margin: 0 0 20px; letter-spacing: 2px; text-transform: uppercase; }

        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr)); gap: 16px; padding: 20px; max-width: 900px; margin: 0 auto; }

        .category-card {
            background: var(--white);
            border-radius: 20px;
            padding: clamp(25px, 6vw, 40px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }
        .category-card:hover, .category-card:active { transform: translateY(-4px); background: var(--blush); border-color: var(--sage); box-shadow: 0 0 25px rgba(250,218,221,0.8); }
        .category-card h2 { color: var(--sage); font-family: serif; font-size: clamp(1.3rem, 5vw, 1.8rem); margin: 0 0 8px; }
        .category-card p { color: #999; font-size: 0.85rem; margin: 0; }
        .card-emoji { font-size: 2rem; margin-bottom: 10px; }

        .header-right { display: flex; align-items: center; gap: 10px; }
        .greeting { font-weight: bold; color: var(--sage); font-size: clamp(0.8rem, 3vw, 1rem); }

        @media (max-width: 480px) {
            .category-grid { padding: 15px; gap: 12px; }
            .greeting { display: none; }
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <button class="back-arrow" onclick="window.location.href='index.html'">←</button>
        <div class="header-right">
            <span class="greeting" id="greeting-text">Hi, Beauty! ✨</span>
            <img id="nav-profile" class="profile-pic" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238A9A5B'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">
        </div>
    </div>

    <h1 class="page-title">Luna Lift</h1>
    <p class="subtitle">Choose your focus</p>

    <div class="category-grid">
        <div class="category-card" onclick="window.location.href='glutes.html'">
            <div class="card-emoji">🍑</div>
            <h2>Glutes & Quads</h2>
            <p>Lower body sculpting</p>
        </div>
        <div class="category-card" onclick="window.location.href='upperbody.html'">
            <div class="card-emoji">💪</div>
            <h2>Upper Body</h2>
            <p>Arms, chest & back</p>
        </div>
        <div class="category-card" onclick="window.location.href='core.html'">
            <div class="card-emoji">🔥</div>
            <h2>Core & Abs</h2>
            <p>Strengthen your centre</p>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const savedPic = localStorage.getItem('lunaProfilePic');
            if (savedPic) {
                document.getElementById('nav-profile').src = savedPic;
            }
        });
    </script>
</body>
</html>
