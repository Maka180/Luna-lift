<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Luna Lift | Categories</title>

    <style>

        :root { --sage: #8A9A5B; --cream: #FAF9F6; --white: #ffffff; --blush: #FADADD; }

        body { background-color: var(--cream); margin: 0; font-family: 'Segoe UI', sans-serif; text-align: center; }

        

        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; }

        .back-arrow { background: none; border: none; color: var(--sage); font-size: 2rem; cursor: pointer; font-weight: bold; }

        .profile-pic { width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--sage); object-fit: cover; }

        

        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px; max-width: 900px; margin: 0 auto; }

        .category-card { background: var(--white); border-radius: 20px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }

        .category-card:hover { transform: translateY(-5px); background: var(--blush); }

        .category-card h2 { color: var(--sage); font-family: serif; font-size: 1.8rem; margin: 0; }

    </style>

</head>

<body>

    <div class="header-bar">

        <button class="back-arrow" onclick="window.location.href='index.html'">←</button>

        <div style="display: flex; align-items: center; gap: 15px;">

            <span style="font-weight: bold; color: var(--sage);">Hi, Beauty! ✨</span>

            <img id="nav-profile" class="profile-pic" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238A9A5B'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E">

        </div>

    </div>



    <h1 style="color: var(--sage); font-size: 3rem; font-family: serif; margin-top: 20px;">Luna Lift</h1>

    <div class="category-grid">

        <div class="category-card" onclick="window.location.href='glutes.html'">

            <h2>Glutes & Quads</h2>

        </div>

       <div class="category-card" onclick="window.location.href='upperbody.html'">
    <h2>Upper Body</h2>
</div>

<div class="category-card" onclick="window.location.href='core.html'">
    <h2>Core & Abs</h2>
</div>

    </div>



    <script>
    window.addEventListener('DOMContentLoaded', () => {
        // 1. Identify who is logged in
        const currentUser = localStorage.getItem('lunaUser') || 'guest';
        
        // 2. Look for the photo box with THAT user's name on it
        const photoKey = `lunaProfilePic_${currentUser}`;
        const savedPic = localStorage.getItem(photoKey);
        
        // 3. Update the profile image if it exists
        if (savedPic) {
            document.getElementById('nav-profile').src = savedPic;
        }

        // Optional: Update the "Hi, Beauty!" greeting with their actual name
        const greetingSpan = document.querySelector('.header-bar span');
        if (greetingSpan && currentUser !== 'guest') {
            greetingSpan.innerText = `Hi, ${currentUser}! ✨`;
        }
    });
</script>

</body>

</html>
